name: Bootstrap command card follow-up

on:
  push:
    branches: [ fix/command-dispatch-icon-compact ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  bootstrap:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[followup-bootstrap]') }}
    runs-on: windows-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/command-dispatch-icon-compact
          fetch-depth: 0

      - name: Retarget follow-up workflow
        shell: pwsh
        run: |
          $path = '.github/workflows/apply-command-card-followup.yml'
          $text = Get-Content $path -Raw
          $text = $text.Replace('fix/smart-command-card-reporting', 'fix/command-dispatch-icon-compact')
          Set-Content -Path $path -Value $text -NoNewline
          git rm .github/workflows/bootstrap-command-card-followup.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add $path
          git commit -m 'ci: retarget command card follow-up [followup-bootstrap]'
          git push origin HEAD:fix/command-dispatch-icon-compact
