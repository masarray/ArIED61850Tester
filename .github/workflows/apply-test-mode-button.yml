name: Apply test mode command availability

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/command-health-event-first-ui
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply test-mode fix
        shell: pwsh
        run: python tools/fix_test_mode_button.py
      - name: Commit fix
        shell: pwsh
        run: |
          git rm tools/fix_test_mode_button.py
          git rm .github/workflows/apply-test-mode-button.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add MainWindow.CommandPanelUx.cs
          git commit -m 'fix: keep test commands available for unchanged state'
          git push origin HEAD:fix/command-health-event-first-ui
