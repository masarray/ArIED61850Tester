name: Apply Open SCL import feature

on:
  push:
    branches:
      - feat/open-scl-import

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/open-scl-import
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply and validate Open SCL source changes
        shell: pwsh
        run: |
          python tools/apply_open_scl_import.py
          python -c "import xml.etree.ElementTree as E; E.parse('App.xaml'); E.parse('MainWindow.xaml'); print('XAML XML validation passed')"
          git diff --check

      - name: Commit generated source changes
        shell: pwsh
        run: |
          git rm tools/apply_open_scl_import.py
          git rm .github/workflows/apply-open-scl-import.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Services/SclImportService.cs MainWindow.xaml MainWindow.xaml.cs README.md
          git commit -m 'feat: import IEC 61850 IED endpoints from SCL'
          git push origin HEAD:feat/open-scl-import
