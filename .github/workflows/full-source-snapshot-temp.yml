name: Temporary full source snapshot

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: arsas-full-source-snapshot
          path: .
          include-hidden-files: true
          retention-days: 1
