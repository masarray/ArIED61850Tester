name: Debug command source snapshot

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: fix/command-dispatch-icon-compact
      - name: Upload command source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: command-source-snapshot
          path: |
            MainWindow.xaml
            MainWindow.xaml.cs
            Services/NativeIec61850Client.cs
            .github/workflows/apply-command-card-followup-v2.yml
