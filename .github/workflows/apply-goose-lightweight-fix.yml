name: Apply lightweight GOOSE correction

on:
  push:
    branches:
      - feature/goose-lightweight-values-adapter
    paths:
      - scripts/apply-goose-lightweight-fix.py
      - .github/workflows/apply-goose-lightweight-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/goose-lightweight-values-adapter
          fetch-depth: 0

      - name: Apply lightweight GOOSE patch
        run: python3 scripts/apply-goose-lightweight-fix.py

      - name: Commit generated changes
        shell: bash
        run: |
          # Keep this as a one-shot source transformer; generated files are reviewed in the PR.
          if git diff --quiet -- Models/GooseSubscriberModels.cs Models/GoosePresentationModels.cs MainWindow.GooseTimeline.cs MainWindow.GooseSubscriber.cs Services/GooseSubscriberRuntime.cs Views/GooseSubscriberView.xaml .github/workflows/build.yml; then
            echo "No generated changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Models/GooseSubscriberModels.cs Models/GoosePresentationModels.cs MainWindow.GooseTimeline.cs MainWindow.GooseSubscriber.cs Services/GooseSubscriberRuntime.cs Views/GooseSubscriberView.xaml .github/workflows/build.yml
          git commit -m "fix: lighten GOOSE UI and decode engineer values"
          git push origin HEAD:feature/goose-lightweight-values-adapter
