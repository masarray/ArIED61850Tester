name: Apply premium P2 card refinement

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event.pull_request.head.ref == 'fix/premium-p2-ui' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/premium-p2-ui
          fetch-depth: 0

      - name: Decode and apply card refinement
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64, hashlib, zlib
          payload = Path('.staging/p2-card/apply.zlib.b64').read_text(encoding='utf-8').strip()
          compressed = base64.b64decode(payload, validate=True)
          digest = hashlib.sha256(compressed).hexdigest()
          expected = 'f65f9761e89706a4b056be912df55c22466833f600f4adb0074839dfac4d88f3'
          if digest != expected:
              raise SystemExit(f'P2 card transform digest mismatch: {digest}')
          Path('/tmp/apply_p2_card.py').write_bytes(zlib.decompress(compressed))
          PY
          python3 /tmp/apply_p2_card.py

      - name: Validate final source invariants
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          for filename in ('App.xaml', 'MainWindow.xaml', 'SaveSclWindow.xaml'):
              ET.parse(filename)
          app = Path('App.xaml').read_text(encoding='utf-8')
          main = Path('MainWindow.xaml').read_text(encoding='utf-8')
          project = Path('ArIED61850Tester.csproj').read_text(encoding='utf-8')
          workflow = Path('.github/workflows/build.yml').read_text(encoding='utf-8')
          item_style = main.split('<ListBox.ItemContainerStyle>', 1)[1].split('</ListBox.ItemContainerStyle>', 1)[0]
          if 'ScaleTransform' in item_style or 'RenderTransform' in item_style:
              raise SystemExit('IED card geometry-changing hover regressed')
          required = (
              'x:Key="StopAction"',
              '<Setter Property="Background" Value="Transparent"/>',
              '<ColumnDefinition Width="276"/>',
              'Width="46" Height="46"',
              'Stroke="{StaticResource StopAction}"',
              'Stroke="{StaticResource Danger}"',
          )
          combined = app + main
          for token in required:
              if token not in combined:
                  raise SystemExit(f'missing card invariant: {token}')
          if '<Version>1.6.14</Version>' not in project or '-Version 1.6.14' not in workflow:
              raise SystemExit('release metadata was not aligned to 1.6.14')
          PY

      - name: Create atomic production commit
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: fix/premium-p2-ui
        shell: bash
        run: |
          set -euo pipefail
          repo="repos/$GITHUB_REPOSITORY"
          base_commit=$(git rev-parse HEAD)
          base_tree=$(gh api "$repo/git/commits/$base_commit" --jq .tree.sha)
          tree_entries='[]'

          add_blob() {
            local path="$1"
            local blob
            blob=$(base64 -w0 "$path" | jq -Rs '{content:.,encoding:"base64"}' | gh api --method POST "$repo/git/blobs" --input - --jq .sha)
            tree_entries=$(jq --arg path "$path" --arg sha "$blob" '. + [{path:$path,mode:"100644",type:"blob",sha:$sha}]' <<<"$tree_entries")
          }

          add_blob App.xaml
          add_blob MainWindow.xaml
          add_blob ArIED61850Tester.csproj
          add_blob scripts/publish-windows-portable.ps1

          tree_sha=$(jq -n --arg base_tree "$base_tree" --argjson tree "$tree_entries" '{base_tree:$base_tree,tree:$tree}' | gh api --method POST "$repo/git/trees" --input - --jq .sha)
          commit_sha=$(jq -n --arg tree "$tree_sha" --arg parent "$base_commit" '{message:"style: refine premium IED card proportions and actions",tree:$tree,parents:[$parent]}' | gh api --method POST "$repo/git/commits" --input - --jq .sha)
          jq -n --arg sha "$commit_sha" '{sha:$sha,force:false}' | gh api --method PATCH "$repo/git/refs/heads/$TARGET_BRANCH" --input - >/dev/null
          echo "Published $commit_sha"
