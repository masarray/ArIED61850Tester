name: Temporary apply IED card two-row fix

on:
  push:
    branches: [ fix/ied-card-two-row-layout ]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/ied-card-two-row-layout
          fetch-depth: 0

      - name: Patch stable two-row IED card layout
        shell: python
        run: |
          from pathlib import Path
          import re

          # Make the lifecycle row explicit and static in XAML.
          xaml_path = Path('MainWindow.xaml')
          xaml = xaml_path.read_text(encoding='utf-8')
          xaml = xaml.replace('<Grid MinHeight="74">', '<Grid MinHeight="108">', 1)
          xaml = xaml.replace(
              '<!-- Adaptive five-slot action bar. It spans the card and reserves the relay-icon area so Play/Stop never clip. -->',
              '<!-- Stable lifecycle action row. Protocol tools use the separate caption row below. -->',
              1)
          old_grid = '<Grid Grid.Row="1" Grid.Column="0" Grid.ColumnSpan="2" Margin="62,4,1,0" Panel.ZIndex="10">'
          new_grid = '<Grid Grid.Row="1" Grid.Column="0" Grid.ColumnSpan="2" Tag="ARSAS_IED_PRIMARY_ACTIONS" Margin="62,4,1,0" Panel.ZIndex="10">'
          if old_grid not in xaml:
              raise SystemExit('Primary IED action grid was not found')
          xaml = xaml.replace(old_grid, new_grid, 1)
          xaml = xaml.replace('<UniformGrid Rows="1" Columns="5" HorizontalAlignment="Stretch">',
                              '<UniformGrid Rows="1" Columns="4" HorizontalAlignment="Stretch">', 1)
          rcb_button = re.compile(
              r'\s*<Button Style="\{StaticResource IedIconButton\}" Width="27" Height="27" Margin="0" Tag="\{Binding\}" Click="IedEditRcb_Click".*?</Button>',
              re.S)
          xaml, count = rcb_button.subn('', xaml, count=1)
          if count != 1:
              raise SystemExit('Legacy icon-only RCB action was not found')
          xaml_path.write_text(xaml, encoding='utf-8')

          # Add a dedicated compact rounded-rectangle style. Do not inherit the large SoftButton chrome.
          app_path = Path('App.xaml')
          app = app_path.read_text(encoding='utf-8')
          if 'x:Key="IedCapabilityPillButton"' not in app:
              marker = '        <Style x:Key="DangerButton" TargetType="Button" BasedOn="{StaticResource PrimaryButton}">'
              style = '''        <!-- Compact protocol-action pills used on the second IED-card row. -->
                  <Style x:Key="IedCapabilityPillButton" TargetType="Button">
                      <Setter Property="Height" Value="26"/>
                      <Setter Property="MinWidth" Value="44"/>
                      <Setter Property="Padding" Value="5,0"/>
                      <Setter Property="Margin" Value="2,0"/>
                      <Setter Property="FontSize" Value="9.6"/>
                      <Setter Property="FontWeight" Value="SemiBold"/>
                      <Setter Property="Foreground" Value="#234377"/>
                      <Setter Property="Background" Value="#EAF1FF"/>
                      <Setter Property="BorderBrush" Value="#B1C6ED"/>
                      <Setter Property="BorderThickness" Value="1"/>
                      <Setter Property="Cursor" Value="Hand"/>
                      <Setter Property="Focusable" Value="False"/>
                      <Setter Property="HorizontalContentAlignment" Value="Center"/>
                      <Setter Property="VerticalContentAlignment" Value="Center"/>
                      <Setter Property="Template">
                          <Setter.Value>
                              <ControlTemplate TargetType="Button">
                                  <Border x:Name="Chrome"
                                          Background="{TemplateBinding Background}"
                                          BorderBrush="{TemplateBinding BorderBrush}"
                                          BorderThickness="{TemplateBinding BorderThickness}"
                                          CornerRadius="8">
                                      <ContentPresenter HorizontalAlignment="{TemplateBinding HorizontalContentAlignment}"
                                                        VerticalAlignment="{TemplateBinding VerticalContentAlignment}"
                                                        Margin="{TemplateBinding Padding}"
                                                        TextElement.Foreground="{TemplateBinding Foreground}"/>
                                  </Border>
                                  <ControlTemplate.Triggers>
                                      <Trigger Property="IsMouseOver" Value="True">
                                          <Setter TargetName="Chrome" Property="Background" Value="#DCE9FF"/>
                                          <Setter TargetName="Chrome" Property="BorderBrush" Value="#7EA5EA"/>
                                      </Trigger>
                                      <Trigger Property="IsPressed" Value="True">
                                          <Setter TargetName="Chrome" Property="Opacity" Value="0.82"/>
                                      </Trigger>
                                      <Trigger Property="IsEnabled" Value="False">
                                          <Setter TargetName="Chrome" Property="Opacity" Value="0.42"/>
                                          <Setter Property="Cursor" Value="Arrow"/>
                                      </Trigger>
                                  </ControlTemplate.Triggers>
                              </ControlTemplate>
                          </Setter.Value>
                      </Setter>
                  </Style>

          '''
              if marker not in app:
                  raise SystemExit('App.xaml style insertion marker was not found')
              app = app.replace(marker, style + marker, 1)
          app_path.write_text(app, encoding='utf-8')

          # Attach the capability row to CardContent, not to the nested lifecycle-action grid.
          behavior_path = Path('FaultRecordUxBehavior.cs')
          behavior = behavior_path.read_text(encoding='utf-8')
          behavior = behavior.replace(
              '    private const string PrimaryRcbToolTipMarker = "RCB Export Filter";\n',
              '    private const string PrimaryActionPanelMarker = "ARSAS_IED_PRIMARY_ACTIONS";\n',
              1)
          old_lookup = re.compile(
              r'            var actionPanel = FindDescendants<System\.Windows\.Controls\.Primitives\.UniformGrid>\(item\).*?            cardGrid\.MinHeight = Math\.Max\(cardGrid\.MinHeight, 100\);',
              re.S)
          new_lookup = '''            var primaryActionGrid = FindDescendants<Grid>(item)
                          .FirstOrDefault(panel => Equals(panel.Tag, PrimaryActionPanelMarker));
                      if (primaryActionGrid?.Parent is not Grid cardGrid)
                          return;

                      var actionPanel = primaryActionGrid.Children
                          .OfType<System.Windows.Controls.Primitives.UniformGrid>()
                          .FirstOrDefault();
                      if (actionPanel == null)
                          return;

                      actionPanel.Columns = 4;
                      cardGrid.MinHeight = Math.Max(cardGrid.MinHeight, 108);'''
          behavior, count = old_lookup.subn(new_lookup, behavior, count=1)
          if count != 1:
              raise SystemExit('Nested action-grid lookup block was not found')
          behavior = behavior.replace('Margin = new Thickness(0, 5, 0, 0)',
                                      'Margin = new Thickness(0, 7, 0, 1)', 1)
          behavior = behavior.replace('Height = 25,', 'Height = 26,', 1)
          behavior = behavior.replace('MinWidth = 0,', 'MinWidth = 44,', 1)
          behavior = behavior.replace('Padding = new Thickness(2, 0, 2, 0),',
                                      'Padding = new Thickness(5, 0, 5, 0),', 1)
          behavior = behavior.replace('FontSize = 9.4,', 'FontSize = 9.6,', 1)
          behavior = behavior.replace('Application.Current.TryFindResource("SoftButton")',
                                      'Application.Current.TryFindResource("IedCapabilityPillButton")', 1)
          behavior_path.write_text(behavior, encoding='utf-8')

          # Strengthen the permanent regression guard.
          guard_path = Path('scripts/verify-rcb-export.ps1')
          guard = guard_path.read_text(encoding='utf-8')
          guard = guard.replace('$mainXaml = Read-RequiredFile "MainWindow.xaml"\n',
                                '$mainXaml = Read-RequiredFile "MainWindow.xaml"\n$appXaml = Read-RequiredFile "App.xaml"\n$capabilityBehavior = Read-RequiredFile "FaultRecordUxBehavior.cs"\n$rcbBridge = Read-RequiredFile "MainWindow.RcbCapability.cs"\n', 1)
          guard = guard.replace(
              'Require-Text $mainXaml \'Click="IedEditRcb_Click"\' "IED-card RCB Export Filter action is missing."\nRequire-Text $mainXaml \'legacy SAS CID import\' "IED-card RCB action no longer explains the legacy SAS workflow."\n',
              'Require-Text $mainXaml \'Tag="ARSAS_IED_PRIMARY_ACTIONS"\' "IED-card lifecycle action row marker is missing."\nRequire-Text $mainXaml \'<UniformGrid Rows="1" Columns="4"\' "IED-card lifecycle row must keep four equal icon slots."\nReject-Text $mainXaml \'Click="IedEditRcb_Click"\' "RCB must remain in the caption capability row, not the lifecycle icon row."\nRequire-Text $capabilityBehavior \'primaryActionGrid?.Parent is not Grid cardGrid\' "Capability row must attach to the outer CardContent grid."\nRequire-Text $capabilityBehavior \'IedCapabilityPillButton\' "Capability actions must use the dedicated rounded-rectangle pill style."\nRequire-Text $capabilityBehavior \'"GOOSE"\' "GOOSE capability caption is missing."\nRequire-Text $capabilityBehavior \'"SMV"\' "SMV capability caption is missing."\nRequire-Text $capabilityBehavior \'"FILE"\' "FILE capability caption is missing."\nRequire-Text $capabilityBehavior \'"RCB"\' "RCB capability caption is missing."\nRequire-Text $rcbBridge \'OpenRcbExportFilter\' "Caption RCB action no longer routes to the production export workflow."\nRequire-Text $appXaml \'x:Key="IedCapabilityPillButton"\' "IED capability pill style is missing."\nRequire-Text $appXaml \'CornerRadius="8"\' "IED capability buttons must remain rounded rectangles rather than ellipses."\nRequire-Text $appXaml \'MinWidth" Value="44"\' "IED capability buttons must retain readable caption width."\n',
              1)
          guard = guard.replace(
              'Require-Text $mainXaml \'Adaptive five-slot action bar\' "IED-card actions are no longer protected from clipping."\nRequire-Text $mainXaml \'<UniformGrid Rows="1" Columns="5"\' "IED-card actions must keep five equal slots."\n',
              '',
              1)
          guard = guard.replace('  ".github/workflows/apply-rcb-card-patch-temp.yml"\n',
                                '  ".github/workflows/apply-rcb-card-patch-temp.yml",\n  ".github/workflows/apply-ied-card-two-row-fix-temp.yml"\n', 1)
          guard_path.write_text(guard, encoding='utf-8')

      - name: Verify permanent regression guard
        shell: pwsh
        run: ./scripts/verify-rcb-export.ps1

      - name: Commit source and remove temporary files
        shell: pwsh
        run: |
          git rm .github/workflows/apply-ied-card-two-row-fix-temp.yml .ied-card-two-row-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MainWindow.xaml App.xaml FaultRecordUxBehavior.cs scripts/verify-rcb-export.ps1
          git commit -m "Restore IED card lifecycle actions and pill capabilities"
          git push origin HEAD:fix/ied-card-two-row-layout
