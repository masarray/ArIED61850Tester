name: Format grouped SCL diagnostics source

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  format:
    if: ${{ github.event.pull_request.head.ref == 'fix/aggregate-scl-findings' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout P1 application branch
        uses: actions/checkout@v4
        with:
          ref: fix/aggregate-scl-findings
          fetch-depth: 0

      - name: Normalize source indentation
        id: format
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("MainWindow.xaml.cs")
          text = path.read_text(encoding="utf-8")
          lines = [
              "    private void LogSclFindings(string sourceName, IReadOnlyList<SclWorkspaceFinding> findings)",
              "    {",
              "        if (findings.Count == 0)",
              "            return;",
              "",
              "        var groups = SclFindingAggregator.Group(findings);",
              "        if (groups.Count != findings.Count)",
              "        {",
              "            AddLog(",
              "                \"INFO\",",
              "                \"SCL\",",
              "                $\"{sourceName} • grouped {findings.Count} raw finding(s) into {groups.Count} diagnostic group(s). Full typed evidence remains attached to the SCL workspace.\");",
              "        }",
              "",
              "        foreach (var group in groups.Take(40))",
              "        {",
              "            AddLog(",
              "                SclFindingAggregator.ToLogLevel(group.Severity),",
              "                \"SCL\",",
              "                $\"{sourceName} • {group.Code} [{group.Scope}]: {group.ToDiagnosticMessage()}\");",
              "        }",
              "",
              "        if (groups.Count > 40)",
              "        {",
              "            var omittedRawCount = groups",
              "                .Skip(40)",
              "                .Sum(group => group.Count);",
              "            AddLog(",
              "                \"WARN\",",
              "                \"SCL\",",
              "                $\"{groups.Count - 40} additional diagnostic group(s), representing {omittedRawCount} raw finding(s), were omitted from the live log.\");",
              "        }",
              "",
              "        if (groups.Any(group => SclFindingAggregator.IsBlockingSeverity(group.Severity)))",
              "            MarkDiagnosticAlert();",
              "    }",
              "",
              "    private bool EnsureSclEndpointBinding"
          ]
          replacement = "\n".join(lines)
          pattern = r"\s*private void LogSclFindings\(string sourceName, IReadOnlyList<SclWorkspaceFinding> findings\).*?\s*private bool EnsureSclEndpointBinding"
          updated, count = re.subn(pattern, "\n\n" + replacement, text, count=1, flags=re.DOTALL)
          if count != 1:
              raise SystemExit("Grouped SCL diagnostics block was not found exactly once")
          changed = updated != text
          if changed:
              path.write_text(updated, encoding="utf-8")
          Path("/tmp/p1_format_changed").write_text("true" if changed else "false", encoding="utf-8")
          PY
          echo "changed=$(cat /tmp/p1_format_changed)" >> "$GITHUB_OUTPUT"

      - name: Commit normalized source
        if: steps.format.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MainWindow.xaml.cs
          git commit -m "style: normalize grouped SCL diagnostics source [applied]"
          git push origin HEAD:fix/aggregate-scl-findings
