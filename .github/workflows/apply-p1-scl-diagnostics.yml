name: Apply grouped SCL diagnostics

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event.pull_request.head.ref == 'fix/aggregate-scl-findings' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout P1 application branch
        uses: actions/checkout@v4
        with:
          ref: fix/aggregate-scl-findings
          fetch-depth: 0

      - name: Replace raw finding dump with grouped presentation
        id: apply
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("MainWindow.xaml.cs")
          text = path.read_text(encoding="utf-8")
          if "SclFindingAggregator.Group(findings)" in text:
              Path("/tmp/p1_app_changed").write_text("false", encoding="utf-8")
              raise SystemExit(0)

          pattern = r'''    private void LogSclFindings\(string sourceName, IReadOnlyList<SclWorkspaceFinding> findings\)\s*\{.*?\n    \}\n\n    private bool EnsureSclEndpointBinding'''
          replacement = '''    private void LogSclFindings(string sourceName, IReadOnlyList<SclWorkspaceFinding> findings)
          {
              if (findings.Count == 0)
                  return;

              var groups = SclFindingAggregator.Group(findings);
              if (groups.Count != findings.Count)
              {
                  AddLog(
                      "INFO",
                      "SCL",
                      $"{sourceName} • grouped {findings.Count} raw finding(s) into {groups.Count} diagnostic group(s). Full typed evidence remains attached to the SCL workspace.");
              }

              foreach (var group in groups.Take(40))
              {
                  AddLog(
                      SclFindingAggregator.ToLogLevel(group.Severity),
                      "SCL",
                      $"{sourceName} • {group.Code} [{group.Scope}]: {group.ToDiagnosticMessage()}");
              }

              if (groups.Count > 40)
              {
                  var omittedRawCount = groups
                      .Skip(40)
                      .Sum(group => group.Count);
                  AddLog(
                      "WARN",
                      "SCL",
                      $"{groups.Count - 40} additional diagnostic group(s), representing {omittedRawCount} raw finding(s), were omitted from the live log.");
              }

              if (groups.Any(group => SclFindingAggregator.IsBlockingSeverity(group.Severity)))
                  MarkDiagnosticAlert();
          }

          private bool EnsureSclEndpointBinding'''

          updated, count = re.subn(pattern, replacement, text, count=1, flags=re.MULTILINE | re.DOTALL)
          if count != 1:
              raise SystemExit("LogSclFindings source block was not found exactly once")

          path.write_text(updated, encoding="utf-8")
          Path("/tmp/p1_app_changed").write_text("true", encoding="utf-8")
          PY
          echo "changed=$(cat /tmp/p1_app_changed)" >> "$GITHUB_OUTPUT"

      - name: Commit grouped diagnostic presentation
        if: steps.apply.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MainWindow.xaml.cs
          git commit -m "fix: aggregate repeated SCL findings [applied]"
          git push origin HEAD:fix/aggregate-scl-findings
