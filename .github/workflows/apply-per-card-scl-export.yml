name: Apply per-card SCL export

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event.pull_request.head.ref == 'feat/per-card-scl-export' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/per-card-scl-export
          fetch-depth: 0

      - name: Apply reviewed source transformation
        id: transform
        continue-on-error: true
        shell: bash
        run: |
          set -u
          set +e
          {
            set -x
            python3 - <<'PY'
          from pathlib import Path
          import base64
          import zlib

          payload = Path('.staging/apply_scl_export.py.zlib.b64').read_text(encoding='utf-8').strip()
          source = zlib.decompress(base64.b64decode(payload)).decode('utf-8')
          exec(compile(source, 'apply_scl_export.py', 'exec'))
          PY

            python3 - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse('MainWindow.xaml')
          ET.parse('SaveSclWindow.xaml')
          PY

            grep -q 'Click="IedSaveScl_Click"' MainWindow.xaml
            grep -q 'Click="IedRemove_Click"' MainWindow.xaml
            grep -q 'HorizontalAlignment="Right" VerticalAlignment="Top"' MainWindow.xaml
            grep -q 'InteroperableSclConverter.WriteFiles' MainWindow.xaml.cs
            grep -q 'LiveIedSclExporter.WriteFiles' MainWindow.xaml.cs
            grep -q 'Edition2V31' SaveSclWindow.xaml.cs
            grep -q 'Edition1V16' SaveSclWindow.xaml.cs
            grep -q 'LiveDiscoveryModel' Models/MonitorModels.cs
            grep -q 'LastLiveModel' Services/NativeIec61850Client.cs
            grep -q '<Version>1.6.10</Version>' ArIED61850Tester.csproj
            grep -q 'Content="{Binding ControlPendingConfirmationLabel}"' MainWindow.xaml
            ! grep -q 'Content="Confirm Open"' MainWindow.xaml
            ! grep -q 'Content="Confirm Close"' MainWindow.xaml
          } > .staging/apply-error.txt 2>&1
          status=$?
          set -e
          exit "$status"

      - name: Upload transformation evidence
        if: steps.transform.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: per-card-scl-export-transform-error
          path: .staging/apply-error.txt
          if-no-files-found: error

      - name: Stop after transformation failure
        if: steps.transform.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Publish production source
        id: publish
        continue-on-error: true
        if: steps.transform.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: feat/per-card-scl-export
        shell: bash
        run: |
          set +e
          {
            set -x
            publish_file() {
              local path="$1"
              local message="$2"
              local current_sha local_blob content payload
              current_sha=$(gh api --method GET "repos/$GITHUB_REPOSITORY/contents/$path" -f ref="$TARGET_BRANCH" --jq .sha 2>/dev/null || true)
              local_blob=$(git hash-object "$path")
              if [ -n "$current_sha" ] && [ "$current_sha" = "$local_blob" ]; then
                echo "$path already current"
                return
              fi
              content=$(base64 -w0 "$path")
              if [ -n "$current_sha" ]; then
                payload=$(jq -n --arg message "$message" --arg content "$content" --arg sha "$current_sha" --arg branch "$TARGET_BRANCH" '{message:$message,content:$content,sha:$sha,branch:$branch}')
              else
                payload=$(jq -n --arg message "$message" --arg content "$content" --arg branch "$TARGET_BRANCH" '{message:$message,content:$content,branch:$branch}')
              fi
              gh api --method PUT "repos/$GITHUB_REPOSITORY/contents/$path" --input - <<<"$payload"
            }
            publish_file MainWindow.xaml "feat: add IED card SCL save action"
            publish_file MainWindow.xaml.cs "feat: add per-card SCL export workflow"
            publish_file Models/MonitorModels.cs "feat: retain card export model"
            publish_file Services/NativeIec61850Client.cs "feat: expose full live discovery model"
            publish_file Services/Iec61850MonitorRuntime.cs "feat: retain live discovery model after scan"
            publish_file SaveSclWindow.xaml "feat: add SCL edition selector"
            publish_file SaveSclWindow.xaml.cs "feat: add SCL edition selector model"
            publish_file docs/SCL_EXPORT.md "docs: document per-card SCL export"
            publish_file ArIED61850Tester.csproj "release: align SCL export version"
            publish_file scripts/publish-windows-portable.ps1 "release: align portable SCL export version"
          } > .staging/publish-error.txt 2>&1
          status=$?
          set -e
          exit "$status"

      - name: Upload publication evidence
        if: steps.publish.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: per-card-scl-export-publish-error
          path: .staging/publish-error.txt
          if-no-files-found: error

      - name: Stop after publication failure
        if: steps.publish.outcome == 'failure'
        shell: bash
        run: exit 1
