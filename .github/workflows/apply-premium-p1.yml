name: Apply premium P1 UI

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event.pull_request.head.ref == 'fix/premium-p0-ui' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/premium-p0-ui
          fetch-depth: 0

      - name: Apply and validate P1 source
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64, zlib
          payload = ''''''
          Path('/tmp/apply_p1.py').write_bytes(zlib.decompress(base64.b64decode(payload)))
          PY
          python3 /tmp/apply_p1.py
          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          ET.parse('MainWindow.xaml')
          text = Path('MainWindow.xaml').read_text(encoding='utf-8')
          section = text.split('<ListBox.ItemContainerStyle>', 1)[1].split('</ListBox.ItemContainerStyle>', 1)[0]
          if 'ScaleTransform ScaleX="1.012"' in section or 'Property="RenderTransform"' in section:
              raise SystemExit('IED card hover still changes scale')
          required = [
              'x:Name="ConnectedBadge"',
              'IedCardConnected',
              'LucideSlidersHorizontal',
              'Style="{StaticResource CommandDataGrid}"',
              'RowStyle="{StaticResource CommandDataGridRow}"',
              'ScrollViewer.HorizontalScrollBarVisibility="Disabled"',
              'Content="{Binding ControlPendingConfirmationLabel}"'
          ]
          for token in required:
              if token not in text:
                  raise SystemExit(f'Missing P1 invariant: {token}')
          if 'Content="Confirm Open"' in text or 'Content="Confirm Close"' in text:
              raise SystemExit('Atomic single Confirm regressed')
          PY

      - name: Create atomic source commit
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: fix/premium-p0-ui
        shell: bash
        run: |
          set -euo pipefail
          repo="repos/$GITHUB_REPOSITORY"
          base_commit=$(git rev-parse HEAD)
          base_tree=$(gh api "$repo/git/commits/$base_commit" --jq .tree.sha)
          blob=$(base64 -w0 MainWindow.xaml | jq -Rs '{content:.,encoding:"base64"}' | gh api --method POST "$repo/git/blobs" --input - --jq .sha)
          tree_sha=$(jq -n --arg base_tree "$base_tree" --arg sha "$blob" '{base_tree:$base_tree,tree:[{path:"MainWindow.xaml",mode:"100644",type:"blob",sha:$sha}]}' | gh api --method POST "$repo/git/trees" --input - --jq .sha)
          commit_sha=$(jq -n --arg tree "$tree_sha" --arg parent "$base_commit" '{message:"style: deliver premium P1 card and command UX",tree:$tree,parents:[$parent]}' | gh api --method POST "$repo/git/commits" --input - --jq .sha)
          jq -n --arg sha "$commit_sha" '{sha:$sha,force:false}' | gh api --method PATCH "$repo/git/refs/heads/$TARGET_BRANCH" --input - >/dev/null
          echo "Published $commit_sha"
