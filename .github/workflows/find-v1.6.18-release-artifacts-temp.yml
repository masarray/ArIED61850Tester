name: Find exact ARSAS 1.6.18 release artifacts

on:
  pull_request:
    paths:
      - ".github/workflows/find-v1.6.18-release-artifacts-temp.yml"

permissions:
  actions: read
  contents: read

jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - name: Locate successful release run and artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: 63ffee62d073486a67ad37921a7c544661203735
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/release-windows.yml/runs?per_page=20" > runs.json
          python - <<'PY'
          import json, os
          data = json.load(open('runs.json', encoding='utf-8'))
          commit = os.environ['RELEASE_COMMIT']
          matches = [r for r in data.get('workflow_runs', []) if r.get('head_sha') == commit]
          print(json.dumps(matches, indent=2))
          if not matches:
              raise SystemExit('No release workflow run found for target commit')
          run = sorted(matches, key=lambda r: r.get('run_number', 0), reverse=True)[0]
          open('run-id.txt', 'w').write(str(run['id']))
          open('release-run.json', 'w').write(json.dumps(run, indent=2))
          PY
          run_id=$(cat run-id.txt)
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts?per_page=100" > release-artifacts.json
          cat release-run.json
          cat release-artifacts.json
      - uses: actions/upload-artifact@v4
        with:
          name: exact-v1.6.18-release-artifact-lookup
          path: |
            release-run.json
            release-artifacts.json
