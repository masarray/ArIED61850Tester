name: Fix premium P2 WPF compatibility

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  fix:
    if: ${{ github.event.pull_request.head.ref == 'fix/premium-p2-ui' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/premium-p2-ui
          fetch-depth: 0

      - name: Remove unsupported TextBlock property
        id: patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('App.xaml')
          text = path.read_text(encoding='utf-8')
          unsupported = '            <Setter Property="CharacterSpacing" Value="55"/>\n'
          if unsupported not in text:
              Path('/tmp/p2_changed').write_text('false', encoding='utf-8')
          else:
              path.write_text(text.replace(unsupported, '', 1), encoding='utf-8')
              Path('/tmp/p2_changed').write_text('true', encoding='utf-8')
          PY
          echo "changed=$(cat /tmp/p2_changed)" >> "$GITHUB_OUTPUT"

      - name: Validate patched XAML
        if: steps.patch.outputs.changed == 'true'
        shell: bash
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path
          ET.parse('App.xaml')
          app = Path('App.xaml').read_text(encoding='utf-8')
          if 'CharacterSpacing' in app:
              raise SystemExit('Unsupported CharacterSpacing remained in WPF resources')
          if 'x:Key="MetaLabel"' not in app:
              raise SystemExit('MetaLabel style was lost')
          PY

      - name: Publish WPF compatibility fix
        if: steps.patch.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: fix/premium-p2-ui
        shell: bash
        run: |
          set -euo pipefail
          repo="repos/$GITHUB_REPOSITORY"
          base_commit=$(git rev-parse HEAD)
          base_tree=$(gh api "$repo/git/commits/$base_commit" --jq .tree.sha)
          blob=$(base64 -w0 App.xaml | jq -Rs '{content:.,encoding:"base64"}' | gh api --method POST "$repo/git/blobs" --input - --jq .sha)
          tree_sha=$(jq -n --arg base_tree "$base_tree" --arg blob "$blob" '{base_tree:$base_tree,tree:[{path:"App.xaml",mode:"100644",type:"blob",sha:$blob}]}' | gh api --method POST "$repo/git/trees" --input - --jq .sha)
          commit_sha=$(jq -n --arg tree "$tree_sha" --arg parent "$base_commit" '{message:"fix: keep P2 typography WPF-compatible",tree:$tree,parents:[$parent]}' | gh api --method POST "$repo/git/commits" --input - --jq .sha)
          jq -n --arg sha "$commit_sha" '{sha:$sha,force:false}' | gh api --method PATCH "$repo/git/refs/heads/$TARGET_BRANCH" --input - >/dev/null
          echo "Published $commit_sha"
