name: Apply control first-click and report dchg fix

on:
  push:
    branches: [ fix/control-first-click-report-dchg ]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[control-first-click-dchg-applied]') }}
    runs-on: windows-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: fix/control-first-click-report-dchg
          fetch-depth: 0

      - name: Apply reviewed source patch
        shell: bash
        run: |
          cat > /tmp/control-first-click.patch.gz.b64 <<'PATCH_B64'

PATCH_B64
          base64 -d /tmp/control-first-click.patch.gz.b64 | gzip -d > /tmp/control-first-click.patch
          python - <<'PY'
          from pathlib import Path
          files = [
              Path('MainWindow.CommandPanelUx.cs'),
              Path('MainWindow.xaml.cs'),
              Path('Services/Iec61850MonitorRuntime.cs'),
              Path('Services/NativeIec61850Client.cs'),
          ]
          for path in files:
              path.write_text(path.read_text(encoding='utf-8').replace('\r\n', '\n'), encoding='utf-8', newline='\n')
          PY
          git apply --check /tmp/control-first-click.patch
          git apply /tmp/control-first-click.patch

      - name: Commit source changes
        shell: pwsh
        run: |
          git rm .github/workflows/apply-control-first-click-report-dchg.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add MainWindow.CommandPanelUx.cs MainWindow.xaml.cs Services/Iec61850MonitorRuntime.cs Services/NativeIec61850Client.cs
          git commit -m 'fix: prioritize first-click control and enforce dynamic dchg [control-first-click-dchg-applied]'
          git push origin HEAD:fix/control-first-click-report-dchg
