name: Diagnose updater build

on:
  pull_request:
    branches: [ main ]
    paths:
      - "App.xaml.cs"
      - "AppUpdate*.cs"
      - "UpdatePromptWindow.*"
      - ".github/workflows/updater-diagnostic.yml"

permissions:
  contents: read

jobs:
  compile:
    runs-on: windows-latest
    steps:
      - name: Checkout ARSAS
        uses: actions/checkout@v4

      - name: Checkout ARIEC61850
        shell: powershell
        run: git clone --quiet --depth 1 https://github.com/masarray/ARIEC61850.git ..\ARIEC61850

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\ArIED61850Tester.csproj

      - name: Compile updater with concise diagnostics
        shell: powershell
        run: |
          $output = @(& dotnet build .\ArIED61850Tester.csproj -c Release --no-restore -v:q 2>&1)
          if ($LASTEXITCODE -ne 0) {
            $matches = @($output | Select-String -Pattern ': error (CS|MC|XDG|NETSDK)[0-9]+')
            if ($matches.Count -eq 0) { $matches = $output | Select-Object -Last 30 }
            $matches | ForEach-Object { Write-Host $_ }
            exit 1
          }
          $output | Select-Object -Last 10
