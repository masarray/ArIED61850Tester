name: Apply GOOSE runtime and IED icon correction

on:
  push:
    branches: [ fix/goose-runtime-and-ied-icon ]
    paths:
      - .github/goose-ied-fix.patch.gz.b64
      - .github/workflows/apply-goose-ied-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: fix/goose-runtime-and-ied-icon
          fetch-depth: 0

      - name: Decode and apply audited patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64, gzip
          encoded = Path('.github/goose-ied-fix.patch.gz.b64').read_text(encoding='utf-8').strip()
          Path('/tmp/goose-ied-fix.patch').write_bytes(gzip.decompress(base64.b64decode(encoded)))
          PY
          git apply --ignore-space-change --ignore-whitespace --whitespace=nowarn /tmp/goose-ied-fix.patch

      - name: Validate focused correction
        shell: bash
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse('MainWindow.xaml')
          PY
          grep -q 'ScaleTransform ScaleX="1.36" ScaleY="1.36"' MainWindow.xaml
          grep -q 'x:Name="MonitorStateBadge"' MainWindow.xaml
          grep -q 'ActivateGooseSubscriberWorkspace' MainWindow.GooseSubscriber.cs MainWindow.xaml.cs
          grep -q 'Unbound capture mode' MainWindow.GooseSubscriber.cs
          grep -q '\[bool\]\$SingleFile = \$false' scripts/publish-windows-portable.ps1
          grep -q 'SharpPcap.dll' scripts/publish-windows-portable.ps1
          grep -q 'AR.Iec61850.Transports.Npcap.dll' scripts/publish-windows-portable.ps1

      - name: Commit corrected sources
        shell: bash
        run: |
          git rm .github/goose-ied-fix.patch.gz.b64 .github/workflows/apply-goose-ied-fix.yml
          git add MainWindow.xaml MainWindow.xaml.cs MainWindow.GooseSubscriber.cs scripts/publish-windows-portable.ps1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: restore GOOSE workspace and enlarge IED status icon"
          git push origin HEAD:fix/goose-runtime-and-ied-icon
