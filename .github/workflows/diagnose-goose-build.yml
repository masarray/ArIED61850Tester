name: Apply GOOSE VLAN nullable fix

on:
  push:
    branches: [ feature/goose-subscriber ]
    paths:
      - .github/workflows/diagnose-goose-build.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/goose-subscriber
          fetch-depth: 0

      - name: Apply nullable VLAN fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('MainWindow.GooseSubscriber.cs')
          source = path.read_text(encoding='utf-8')
          old = '''        var vlan = frame.Vlan is null
              ? "untagged"
              : $"VID {frame.Vlan.VlanId} / PCP {frame.Vlan.PriorityCodePoint}";'''
          new = '''        var vlan = frame.Vlan is { } vlanTag
              ? $"VID {vlanTag.VlanId} / PCP {vlanTag.PriorityCodePoint}"
              : "untagged";'''
          if source.count(old) != 1:
              raise SystemExit(f'Expected exactly one nullable VLAN block, found {source.count(old)}')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Commit fix and remove temporary workflow
        shell: bash
        run: |
          rm -f .github/workflows/diagnose-goose-build.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: unwrap nullable GOOSE VLAN tag before display"
          git push origin HEAD:feature/goose-subscriber
