name: Apply GOOSE VLAN nullable fix

on:
  pull_request:
    branches: [ main ]
    paths:
      - .github/workflows/diagnose-goose-build.yml
  push:
    branches: [ feature/goose-subscriber ]
    paths:
      - .github/workflows/diagnose-goose-build.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/goose-subscriber
          fetch-depth: 0

      - name: Apply nullable VLAN fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          path = Path('MainWindow.GooseSubscriber.cs')
          source = path.read_text(encoding='utf-8')
          pattern = re.compile(
              r'        var vlan = frame\.Vlan is null\r?\n'
              r'\s*\? "untagged"\r?\n'
              r'\s*: \$"VID \{frame\.Vlan\.VlanId\} / PCP \{frame\.Vlan\.PriorityCodePoint\}";')
          replacement = '''        var vlan = frame.Vlan is { } vlanTag
              ? $"VID {vlanTag.VlanId} / PCP {vlanTag.PriorityCodePoint}"
              : "untagged";'''
          updated, count = pattern.subn(replacement, source, count=1)
          if count != 1:
              raise SystemExit(f'Expected exactly one nullable VLAN block, found {count}')
          path.write_text(updated, encoding='utf-8')
          PY

      - name: Commit source fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MainWindow.GooseSubscriber.cs
          git commit -m "fix: unwrap nullable GOOSE VLAN tag before display"
          git push origin HEAD:feature/goose-subscriber
