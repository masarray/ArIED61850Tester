name: Apply P0 inspection exception guard

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event.pull_request.head.ref == 'fix/atomic-control-confirmation' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout P0 branch
        uses: actions/checkout@v4
        with:
          ref: fix/atomic-control-confirmation
          fetch-depth: 0

      - name: Apply reviewed exception guards
        id: patch
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d .p0 ]; then
            echo "applied=false" >> "$GITHUB_OUTPUT"
            echo "Exception guards were already applied."
            exit 0
          fi

          for patch in \
            .p0/MainWindow.catch.patch \
            .p0/CommandPanel.catch.patch
          do
            git apply --check "$patch"
            git apply "$patch"
          done
          rm -rf .p0
          echo "applied=true" >> "$GITHUB_OUTPUT"

      - name: Commit exception ownership guards
        if: ${{ steps.patch.outputs.applied == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: prevent inspection errors from overwriting command results [applied]"
          git push origin HEAD:fix/atomic-control-confirmation
