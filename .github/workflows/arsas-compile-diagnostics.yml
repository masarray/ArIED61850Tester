name: ARSAS compile diagnostics

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  ARIEC61850_REF: main

jobs:
  compile:
    if: github.head_ref == 'feat/arsas-realistic-demo'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/arsas-realistic-demo
          fetch-depth: 0
      - name: Apply generated ARSAS source
        shell: powershell
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          python .\scripts\apply-arsas-rebrand-demo.py
          python .\scripts\fix-arsas-generated-source.py
      - name: Checkout engine
        shell: powershell
        run: git clone --quiet --depth 1 --branch $env:ARIEC61850_REF https://github.com/masarray/ARIEC61850.git ..\ARIEC61850
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        shell: powershell
        run: dotnet restore .\ArIED61850Tester.csproj
      - name: Build
        shell: powershell
        run: dotnet build .\ArIED61850Tester.csproj -c Release --no-restore
      - name: Commit production ARSAS sources
        shell: powershell
        run: |
          git fetch origin main --depth 1
          git checkout origin/main -- scripts/verify-source-clean.ps1
          $temporary = @(
            ".github/workflows/arsas-compile-diagnostics.yml",
            ".github/workflows/apply-arsas-rebrand-demo.yml",
            "scripts/apply-arsas-rebrand-demo.py",
            "scripts/export-arsas-patch-files.py",
            "scripts/fix-arsas-generated-source.py"
          )
          foreach ($path in $temporary) {
            if (Test-Path $path) { git rm -f -- $path }
          }
          if (Test-Path "docs/__arsas_patch_export") {
            Remove-Item "docs/__arsas_patch_export" -Recurse -Force
          }
          git add -A
          if (git diff --cached --quiet) {
            Write-Host "No production changes to commit."
            exit 0
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: rebrand product as ARSAS and refine communication workspace"
          git push origin HEAD:feat/arsas-realistic-demo
