name: Finalize GOOSE build correction

on:
  push:
    branches: [ fix/goose-runtime-and-ied-icon ]
    paths:
      - .github/workflows/finalize-goose-fix.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/goose-runtime-and-ied-icon
          fetch-depth: 0
      - name: Add explicit IO namespace and remove temporary diagnostics
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('MainWindow.GooseSubscriber.cs')
          text = path.read_text(encoding='utf-8')
          marker = 'using System.Globalization;\n'
          if 'using System.IO;\n' not in text:
              if marker not in text:
                  raise SystemExit('using marker not found')
              text = text.replace(marker, marker + 'using System.IO;\n', 1)
              path.write_text(text, encoding='utf-8')
          PY
          git rm .github/workflows/diagnose-goose-build.yml .github/workflows/finalize-goose-fix.yml
          git add MainWindow.GooseSubscriber.cs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: import IO exception types for GOOSE diagnostics"
          git push origin HEAD:fix/goose-runtime-and-ied-icon
