name: Apply Close feedback event correlation

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply-and-build:
    runs-on: windows-latest
    steps:
      - name: Checkout ArIED fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/close-feedback-event-correlation
          path: ArIED61850Tester
          fetch-depth: 0

      - name: Apply reviewed application patch
        shell: bash
        working-directory: ArIED61850Tester
        run: |
          git apply --check --ignore-space-change --ignore-whitespace patches/close-feedback-event-correlation.patch
          git apply --ignore-space-change --ignore-whitespace patches/close-feedback-event-correlation.patch

      - name: Checkout corrected ARIEC61850 engine
        uses: actions/checkout@v4
        with:
          repository: masarray/ARIEC61850
          ref: main
          path: ARIEC61850

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\ArIED61850Tester\ArIED61850Tester.csproj

      - name: Build
        run: dotnet build .\ArIED61850Tester\ArIED61850Tester.csproj -c Release --no-restore

      - name: Commit corrected application source
        shell: pwsh
        working-directory: ArIED61850Tester
        run: |
          git rm patches/close-feedback-event-correlation.patch
          git rm .github/workflows/apply-close-feedback-event-correlation.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Models/NativeReportMonitorModels.cs Services/Iec61850MonitorRuntime.cs Services/Iec61850ReportPlanner.cs Services/NativeIec61850Client.cs
          git commit -m 'fix: correlate Close feedback with event-driven reports'
          git push origin HEAD:fix/close-feedback-event-correlation
